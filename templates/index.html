<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Placement Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Student Placement Prediction</h1>

    <form action="/predict" method="POST">

        <div class="grid">

            <div class="field">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="field">
                <label>Age (18 - 35)</label>
                <input type="number" name="age" min="18" max="35" placeholder="e.g. 22" required>
            </div>

            <div class="field">
                <label>City Tier</label>
                <select name="city_tier" required>
                    <option value="Tier 1">Tier 1</option>
                    <option value="Tier 2">Tier 2</option>
                    <option value="Tier 3">Tier 3</option>
                </select>
            </div>

            <div class="field">
                <label>SSC Percentage (0 - 100)</label>
                <input type="number" name="ssc_percentage" min="0" max="100" step="0.01" placeholder="e.g. 85.50" required>
            </div>

            <div class="field">
                <label>SSC Board</label>
                <select name="ssc_board" required>
                    <option value="CBSE">CBSE</option>
                    <option value="State">State</option>
                    <option value="ICSE">ICSE</option>
                </select>
            </div>

            <div class="field">
                <label>HSC Percentage (0 - 100)</label>
                <input type="number" name="hsc_percentage" min="0" max="100" step="0.01" placeholder="e.g. 82.30" required>
            </div>

            <div class="field">
                <label>HSC Board</label>
                <select name="hsc_board" required>
                    <option value="CBSE">CBSE</option>
                    <option value="State">State</option>
                    <option value="ICSE">ICSE</option>
                </select>
            </div>

            <div class="field">
                <label>HSC Stream</label>
                <select name="hsc_stream" required>
                    <option value="Science">Science</option>
                    <option value="Commerce">Commerce</option>
                    <option value="Arts">Arts</option>
                </select>
            </div>

            <div class="field">
                <label>Degree Percentage (0 - 100)</label>
                <input type="number" name="degree_percentage" min="0" max="100" step="0.01" placeholder="e.g. 78.40" required>
            </div>

            <div class="field">
                <label>Degree Field</label>
                <select name="degree_field" required>
                    <option value="Engineering">Engineering</option>
                    <option value="Business">Business</option>
                    <option value="Arts">Arts</option>
                    <option value="Science">Science</option>
                </select>
            </div>

            <div class="field">
                <label>MBA Percentage (0 - 100)</label>
                <input type="number" name="mba_percentage" min="0" max="100" step="0.01" value="0">
            </div>

            <div class="field">
                <label>Internships (0 - 10)</label>
                <input type="number" name="internships_count" min="0" max="10" placeholder="e.g. 2" required>
            </div>

            <div class="field">
                <label>Projects (0 - 20)</label>
                <input type="number" name="projects_count" min="0" max="20" placeholder="e.g. 5" required>
            </div>

            <div class="field">
                <label>Certifications (0 - 20)</label>
                <input type="number" name="certifications_count" min="0" max="20" placeholder="e.g. 3" required>
            </div>

            <div class="field">
                <label>Technical Skills (0 - 10)</label>
                <input type="number" name="technical_skills_score" min="0" max="10" step="0.1" placeholder="e.g. 8.5" required>
            </div>

            <div class="field">
                <label>Soft Skills (0 - 10)</label>
                <input type="number" name="soft_skills_score" min="0" max="10" step="0.1" placeholder="e.g. 7.8" required>
            </div>

            <div class="field">
                <label>Aptitude Score (0 - 100)</label>
                <input type="number" name="aptitude_score" min="0" max="100" step="0.1" placeholder="e.g. 84.5" required>
            </div>

            <div class="field">
                <label>Communication Score (0 - 10)</label>
                <input type="number" name="communication_score" min="0" max="10" step="0.1" placeholder="e.g. 8.2" required>
            </div>

            <div class="field">
                <label>Work Experience (0 - 60 Months)</label>
                <input type="number" name="work_experience_months" min="0" max="60" placeholder="e.g. 12" required>
            </div>

            <div class="field">
                <label>Leadership Roles (0 - 20)</label>
                <input type="number" name="leadership_roles" min="0" max="20" placeholder="e.g. 2" required>
            </div>

            <div class="field">
                <label>Extracurricular Activities (0 - 20)</label>
                <input type="number" name="extracurricular_activities" min="0" max="20" placeholder="e.g. 5" required>
            </div>

            <div class="field">
                <label>Backlogs (0 - 10)</label>
                <input type="number" name="backlogs" min="0" max="10" placeholder="e.g. 0" required>
            </div>

        </div>

        <button type="submit">Predict Placement</button>

    </form>

    {% if prediction %}
    <div class="result">
        <h2>{{ prediction }}</h2>
    </div>
    {% endif %}

</div>

</body>
</html>
